version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: spring-postgres
    environment:
      POSTGRES_DB: myDB_prod
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 412006
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - spring-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myDB_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: spring-redis
    command: redis-server --requirepass MyVeryStrongPassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - spring-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spring-boot-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://postgres:5432/myDB_prod
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: 412006
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: MyVeryStrongPassword
      REDIS_DATABASE: 0
      JWT_SECRET: 95fb0a7b70e8e854d4f8bdbd2f1ef754b58866345824ae466813c8e2d9a9ce35
      JWT_EXPIRATION: 3600000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - spring-network
    restart: unless-stopped

networks:
  spring-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: