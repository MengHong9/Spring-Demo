version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: dev-postgres
    environment:
      POSTGRES_DB: myDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 412006
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data

  redis:
    image: redis:6.2-alpine
    container_name: dev-redis
    command: redis-server --requirepass MyVeryStrongPassword
    ports:
      - "6379:6379"
    volumes:
      - redis_dev:/data

volumes:
  postgres_dev:
  redis_dev: